#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "peercalls"
name = "Peer-Calls"
description.en = "Group peer-to-peer calls for everyone"
description.fr = "Appels de groupe peer-to-peer pour tout le monde"

version = "4.2.2~ynh1"

maintainers = ["eric_G"]

[upstream]
license = " Apache-2.0 license"
website = "https://peercalls.com/"
demo = "https://demo.example.com"
admindoc = "https://yunohost.org/packaging_apps"
userdoc = "https://yunohost.org/apps"
code = "https://github.com/peer-calls/peer-calls"

[integration]
yunohost = ">= 11.2"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

        [resources.sources.main]
        extract = false
        in_subdir = false
        rename = "peercalls"
        url = "https://github.com/peer-calls/peer-calls/releases/download/v4.2.2/peercalls.linux.amd64.v4.2.2.tar.gz"
        sha256 = "1252eafc647e3306346f29a94756f33b65bb97a0da6ff9d5fa2035192092b42d"
        autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]